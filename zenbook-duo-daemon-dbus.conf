<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Root owns the well-known name. -->
  <policy user="root">
    <allow own="asus.zenbook.duo"/>
    <allow send_destination="asus.zenbook.duo"/>
    <allow receive_sender="asus.zenbook.duo"/>
  </policy>

  <!--
    Any local connection may message the service; authorization is enforced in the daemon
    (e.g. register_session: UID >= 1000, operator methods: block system UIDs 1–999, etc.).

    A policy restricted to group "zenbook-duo" breaks existing graphical sessions until the user
    logs out and back in: supplementary groups are fixed when user@UID.service starts, so
    `usermod -aG zenbook-duo` does not affect already-running session children until a new login.
  -->
  <policy context="default">
    <allow send_destination="asus.zenbook.duo"/>
    <allow receive_sender="asus.zenbook.duo"/>
  </policy>
</busconfig>
